spring:
  datasource:
    url: jdbc:h2:mem:pacto;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

jwt:
  secret: pacto-test-jwt-secret-must-be-at-least-32-bytes-long
  expiration: 3600000

cors:
  allowed-origins: http://localhost:3000