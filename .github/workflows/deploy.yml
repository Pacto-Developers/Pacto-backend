name: Deploy Pacto API

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: pacto-production
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: pacto-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: pacto-github-actions
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: "829279763575"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build --tag "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Deploy through SSM
        env:
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          IMAGE_URI: ${{ steps.build-image.outputs.image_uri }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy $GITHUB_SHA" \
            --parameters "commands=[\"/opt/pacto/deploy-blue-green.sh $IMAGE_URI\"]" \
            --region "$AWS_REGION" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command: $COMMAND_ID"

          STATUS=Pending

          for attempt in {1..48}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --region "$AWS_REGION" \
              --query 'Status' \
              --output text 2>/dev/null || echo Pending)

            case "$STATUS" in
              Success|Failed|TimedOut|Cancelled)
                break
                ;;
            esac

            sleep 5
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --region "$AWS_REGION" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}'

          test "$STATUS" = "Success"